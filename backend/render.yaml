services:
  - type: web
    name: monday-bi-agent-backend
    env: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GROQ_API_KEY
        sync: false
      - key: MONDAY_API_KEY
        sync: false
      - key: DEALS_BOARD_ID
        sync: false
      - key: WORK_ORDERS_BOARD_ID
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
